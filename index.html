function openAt(d){ return POINTS.filter(p => parseDate(p.aberto_em) <= d && (!p.fechado_em || parseDate(p.fechado_em) > d)).length; }

// ── GRÁFICOS (SVG/CSS puro) ─────────────────────────────────────────────
function Burndown({data}) {
  const W=320, H=190, padL=24, padB=24, padT=8, padR=8;
  const maxY = Math.max(...data.map(d=>d.total), 1);
  const n = data.length;
  const x = i => padL + (n<=1 ? 0 : i*(W-padL-padR)/(n-1));
  const y = v => H-padB - (v/maxY*(H-padB-padT));
  const poly = (key,color,dash) => <polyline points={data.map((d,i)=>x(i)+','+y(d[key])).join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeDasharray={dash||''} strokeLinejoin="round"/>;
  const dots = (key,color) => data.map((d,i)=><circle key={key+i} cx={x(i)} cy={y(d[key])} r="3" fill={color}/>);
  const grid = [0,0.5,1].map((f,i)=>{ const yy=H-padB-(f*(H-padB-padT)); return <g key={i}><line x1={padL} y1={yy} x2={W-padR} y2={yy} stroke="#eef2f7"/><text x="0" y={yy+3} fontSize="8" fill="#94a3b8">{Math.round(f*maxY)}</text></g>; });
  const legend = [['Levantados','#cbd5e1'],['Resolvidos','#10b981'],['Em aberto','#0891b2']];
  return (
    <div>
      <svg viewBox={"0 0 "+W+" "+H} className="w-full" style={{height:200}}>
        {grid}
        {poly('total','#cbd5e1','5 5')}
        {poly('resolvidos','#10b981')}
        {poly('abertos','#0891b2')}
        {dots('total','#cbd5e1')}{dots('resolvidos','#10b981')}{dots('abertos','#0891b2')}
        {data.map((d,i)=><text key={i} x={x(i)} y={H-padB+14} fontSize="8" fill="#64748b" textAnchor="middle">{d.label}</text>)}
      </svg>
      <div className="flex gap-3 justify-center mt-1 flex-wrap">
        {legend.map(([l,c])=><span key={l} className="text-[11px] text-slate-500 flex items-center gap-1"><span className="inline-block w-3 h-1.5 rounded" style={{background:c}}></span>{l}</span>)}
      </div>
    </div>
  );
}

function Bars({data}) {
  const max = Math.max(...data.map(d=>d.resolvido+d.pendente+d.falha), 1);
  const seg = [['resolvido','#10b981'],['pendente','#f59e0b'],['falha','#ef4444']];
  return (
    <div>
      <div className="space-y-2">
        {data.map((d,i)=>(
          <div key={i} className="flex items-center gap-2">
            <div className="w-24 text-[11px] text-slate-600 text-right shrink-0 leading-tight">{d.name}</div>
            <div className="flex-1 flex h-5 rounded overflow-hidden bg-slate-100">
              {seg.map(([k,c])=> d[k]>0 ? <div key={k} style={{width:(d[k]/max*100)+'%',background:c}} className="flex items-center justify-center text-[9px] text-white font-bold">{d[k]}</div> : null)}
            </div>
          </div>
        ))}
      </div>
      <div className="flex gap-3 justify-center mt-3 flex-wrap">
        {seg.map(([k,c])=><span key={k} className="text-[11px] text-slate-500 flex items-center gap-1 capitalize"><span className="inline-block w-3 h-3 rounded-sm" style={{background:c}}></span>{k}</span>)}
      </div>
    </div>
  );
}

function StatusPie({data}) {
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  let acc = 0;
  const stops = data.map(d=>{ const a=acc/total*360; acc+=d.value; const b=acc/total*360; return d.color+" "+a+"deg "+b+"deg"; }).join(', ');
  return (
    <div className="flex items-center justify-center gap-5 flex-wrap py-2">
      <div className="rounded-full shrink-0" style={{width:150,height:150,background:"conic-gradient("+stops+")"}}></div>
      <div className="space-y-1.5">
        {data.map((d,i)=>(
          <div key={i} className="flex items-center gap-2 text-xs text-slate-600">
            <span className="inline-block w-3 h-3 rounded-sm" style={{background:d.color}}></span>
            <span>{d.name}</span><span className="font-bold text-slate-800">{d.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    { label:'Pontos levantados', value:total, sub:'no comissionamento', grad:'from-cyan-500 to-blue-600', bord:'border-cyan-500', icon:'🎯' },
    { label:'Taxa de resolução', value:rate+'%', sub:done+' resolvidos', grad:'from-emerald-500 to-teal-600', bord:'border-emerald-500', icon:'✅' },
    { label:'Em aberto', value:open, sub:'não impeditivas', grad:'from-amber-500 to-orange-500', bord:'border-amber-500', icon:'📈' },
    { label:'Falhas ativas', value:falhas, sub:'em tratamento (80C8, câmeras)', grad:'from-red-500 to-rose-600', bord:'border-red-500', icon:'⚠️' },
  ];

  return (
    <div className={print ? "min-h-screen bg-white p-4" : "min-h-screen bg-slate-50 p-4"}>
      <div className="max-w-5xl mx-auto space-y-4">

        <div className={card + " p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3"}>
          <div>
            <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
              <svg viewBox="0 0 64 64" className="w-8 h-8 shrink-0" fill="none">
                <g stroke="#0891b2" strokeWidth={4.5} strokeLinecap="round">
                  <path d="M34.8 13.4 A11 11 0 0 1 42.6 21.2"/>
                  <path d="M36.4 7.6 A17 17 0 0 1 48.4 19.6"/>
                  <path d="M38 1.8 A23 23 0 0 1 54.2 18"/>
                  <path d="M29.2 13.4 A11 11 0 0 0 21.4 21.2"/>
                  <path d="M27.6 7.6 A17 17 0 0 0 15.6 19.6"/>
                  <path d="M26 1.8 A23 23 0 0 0 9.8 18"/>
                </g>
                <circle cx="32" cy="24" r="3.2" fill="#1e293b"/>
                <polygon points="32,27 24,56 40,56" fill="#1e293b"/>
                <rect x="21" y="55" width="22" height="4" rx="1.5" fill="#1e293b"/>
              </svg>
              Comissionamento TCMW
            </h1>
            <p className="text-slate-500 text-sm mt-1">Secagem de minério por micro-ondas · Resp.: Everton da Silva Campos · {total} pontos</p>
            <p className="text-xs text-slate-400 mt-1">Última atualização: 10/06/2026 · comissionamento iniciado em 18/05</p>
          </div>
          <button onClick={()=>setPrint(!print)} className={"flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm border transition-all " + (print ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50')}>
            🖨️ {print ? 'Tela' : 'Impressão'}
          </button>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-2 flex items-center gap-2">📋 Como ler este painel</h3>
          <ul className="text-xs text-slate-600 space-y-1.5 list-disc pl-5">
            <li><b>Indicadores e gráficos</b> (topo, burndown, status, subsistema, idade das pendências, prontidão por TC): acompanham as <b>{total} pendências/ações</b> levantadas em campo desde 18/05 — o "punch list".</li>
            <li><b>Checklist de comissionamento</b>: o plano de testes — <b>64 ações</b> por sistema e condição (a vazio / com carga). É uma contagem diferente, do plano completo, não das pendências.</li>
            <li><b>Curvas (P&D)</b>: levantamentos de caracterização pedidos pelo time de P&D, realizados na fase com carga.</li>
            <li><b>Fase e selo de liberação</b>: a situação geral do comissionamento e se a operação está liberada.</li>
          </ul>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2">🚀 Fase do comissionamento</h3>
          <div className="flex items-center gap-2">
            <div className="flex-1 rounded-xl border-2 border-emerald-300 bg-emerald-50 p-3 text-center">
              <div className="text-xs font-bold text-emerald-700 uppercase tracking-wide">A vazio</div>
              <div className="text-2xl my-0.5">✅</div>
              <div className="text-[11px] text-slate-500">concluído</div>
            </div>
            <div className="text-xl text-slate-300 font-bold">▶</div>
            <div className="flex-1 rounded-xl border-2 border-cyan-400 bg-cyan-50 p-3 text-center">
              <div className="text-xs font-bold text-cyan-700 uppercase tracking-wide">Com carga</div>
              <div className="text-2xl my-0.5">🚀</div>
              <div className="text-[11px] text-slate-500">em andamento</div>
            </div>
            <div className="text-xl text-slate-300 font-bold">▶</div>
            <div className="flex-1 rounded-xl border-2 border-slate-200 bg-slate-50 p-3 text-center">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wide">Secagem</div>
              <div className="text-2xl my-0.5">🔥</div>
              <div className="text-[11px] text-slate-500">próxima fase</div>
            </div>
          </div>
          <div className="mt-3 flex items-start gap-2 bg-emerald-50 border border-emerald-200 rounded-xl p-3">
            <span className="mt-0.5">✅</span>
            <p className="text-xs text-slate-600">Gate <b>APROVADO (08/06)</b>: teste do skid — bomba, bicos dispersores TC-03/TC-10, alimentação do silo e válvula helicoidal. Fase com carga em curso; conclusão das válvulas de amostragem condicionada a teste com a correia em capacidade máxima.</p>
          </div>
        </div>

        {(() => {
          const reqs = POINTS.filter(p=>p.secagem && !p.fechado_em);
          if (!reqs.length) return null;
          return (
            <div className={card + " p-5"}>
              <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">🔥 Pré-requisitos da fase de secagem</h3>
              <p className="text-slate-400 text-xs mb-3">Não travam os testes com carga atuais, mas precisam estar prontos para os testes de secagem</p>
              <div className="space-y-2">
                {reqs.map(p=>{
                  const dias = daysBetween(refT, parseDate(p.prazo));
                  return (
                    <div key={p.id} className="flex items-start gap-3 rounded-xl border border-orange-200 bg-orange-50 p-3">
                      <div className="flex flex-col gap-1 shrink-0">
                        <span className="text-[10px] font-bold text-white bg-orange-500 px-2 py-0.5 rounded-full whitespace-nowrap text-center">NEC. SECAGEM</span>
                        {p.reincidente && <span className="text-[10px] font-bold text-white bg-red-500 px-2 py-0.5 rounded-full whitespace-nowrap text-center">REINCIDENTE</span>}
                      </div>
                      <div className="flex-1">
                        <p className="text-sm text-slate-700">#{p.id} {p.desc}</p>
                        <p className="text-[11px] text-slate-500 mt-0.5">Prazo: <b>até {fmtShort(parseDate(p.prazo))}</b> · {dias<0 ? 'VENCIDO há '+(-dias)+' dias' : 'faltam '+dias+' dias'}{p.nota ? ' · '+p.nota : ''}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        <div className={"rounded-2xl p-5 border-2 " + (liberavel ? 'border-emerald-400 bg-emerald-50' : 'border-amber-400 bg-amber-50')}>
          <div className="flex items-start gap-3">
            <span className="text-2xl mt-0.5">🛡️</span>
            <div className="flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-bold text-slate-800 text-lg">{liberavel ? 'Operação liberável' : 'Liberação CONDICIONADA'}</span>
                <span className={"text-xs font-bold text-white px-2 py-0.5 rounded-full " + (liberavel?'bg-emerald-500':'bg-amber-500')}>{impeditivos.length} impeditivo{impeditivos.length!==1?'s':''}</span>
              </div>
              <p className="text-sm text-slate-700 mt-1">Nenhuma pendência impede a operação. As {openPts.length} em aberto: {mitigados.length} de segurança (mitigada), {tratamento.length} falhas em tratamento e {melhorias.length} melhorias.</p>
              <div className="mt-3 space-y-1.5">
                {mitigados.map(m=>(
                  <div key={m.id} className="flex items-start gap-2 bg-white border border-blue-200 rounded-lg p-2">
                    <span className="text-[10px] font-bold text-white bg-blue-500 px-2 py-0.5 rounded-full mt-0.5 whitespace-nowrap">MITIGADO</span>
                    <span className="text-xs text-slate-700">#{m.id} {m.desc.split('—')[0].trim()} — {m.nota}</span>
                  </div>
                ))}
                {tratamento.map(t=>(
                  <div key={t.id} className="flex items-start gap-2 bg-white border border-amber-200 rounded-lg p-2">
                    <span className="text-[10px] font-bold text-white bg-amber-500 px-2 py-0.5 rounded-full mt-0.5 whitespace-nowrap">EM TRATAMENTO</span>
                    <span className="text-xs text-slate-700">#{t.id} {t.desc}{t.reincidente ? ' — reincidente' : ''}{t.nota ? ' — '+t.nota : ''}</span>
                  </div>
                ))}
                <div className="text-xs text-slate-500 pl-1">+ {melhorias.length} melhorias (não impeditivas)</div>
              </div>
            </div>
          </div>
        </div>

        <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide px-1">Pendências e ações levantadas · {total} pontos (punch list)</p>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {KPIS.map((k,i)=> print ? (
            <div key={i} className={"bg-white border-l-4 " + k.bord + " border border-slate-200 rounded-2xl p-4"}>
              <div className="text-3xl font-bold text-slate-800">{k.value}</div>
              <div className="text-xs text-slate-500 mt-1">{k.label}</div>
              <div className="text-xs text-slate-400">{k.sub}</div>
            </div>
          ) : (
            <div key={i} className={"bg-gradient-to-br " + k.grad + " text-white rounded-2xl p-4 shadow"}>
              <div className="flex justify-between items-start mb-2"><span className="text-2xl">{k.icon}</span><span className="text-[10px] font-medium bg-white/20 px-2 py-0.5 rounded-full uppercase tracking-wide">{k.label.split(' ')[0]}</span></div>
              <div className="text-3xl font-bold">{k.value}</div>
              <div className="text-xs opacity-80 mt-1">{k.label}</div>
              <div className="text-xs opacity-60">{k.sub}</div>
            </div>
          ))}
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">✅ Checklist de comissionamento</h3>
          <p className="text-slate-400 text-xs mb-3">Plano de testes do comissionamento — 64 ações (contagem distinta dos {total} pontos do punch list). A vazio concluído (1 pendência); condição carregada em andamento desde 09/06.</p>
          <div className="space-y-2">
            {CHECK.map((c,i)=>{
              const segs=[['testado','#10b981',c.testado||0],['andamento','#0891b2',c.andamento||0],['pendente','#ef4444',c.pendente||0]];
              return (
                <div key={i} className="flex items-center gap-2">
                  <div className="w-40 text-[11px] text-slate-600 text-right shrink-0 leading-tight">{c.cond}</div>
                  <div className="flex-1 flex h-5 rounded overflow-hidden bg-slate-100">
                    {c.na ? <div className="w-full bg-slate-300 flex items-center justify-center text-[9px] text-slate-700 font-bold">{c.total} · N/A</div>
                      : segs.map(([k,col,v])=> v>0 ? <div key={k} style={{width:(v/c.total*100)+'%',background:col}} className="flex items-center justify-center text-[9px] text-white font-bold">{v}</div> : null)}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="flex gap-3 justify-center mt-3 flex-wrap">
            <span className="text-[11px] text-slate-500 flex items-center gap-1"><span className="inline-block w-3 h-3 rounded-sm" style={{background:'#10b981'}}></span>Testado</span>
            <span className="text-[11px] text-slate-500 flex items-center gap-1"><span className="inline-block w-3 h-3 rounded-sm" style={{background:'#0891b2'}}></span>Em andamento</span>
            <span className="text-[11px] text-slate-500 flex items-center gap-1"><span className="inline-block w-3 h-3 rounded-sm" style={{background:'#ef4444'}}></span>Pendente</span>
          </div>
          <div className="mt-3 flex items-start gap-2 bg-red-50 border border-red-200 rounded-xl p-3">
            <span className="mt-0.5">⚠️</span>
            <p className="text-xs text-slate-600">Única pendência a vazio: <b>purga do pulmão (ar comprimido)</b>. Todo o restante da condição descarregada foi testado.</p>
          </div>
          <div className="mt-2 flex items-start gap-2 bg-cyan-50 border border-cyan-200 rounded-xl p-3">
            <span className="mt-0.5">🧪</span>
            <p className="text-xs text-slate-600">Carga em andamento: válvulas de amostragem 01/02/03 testadas (09/06) com bom comportamento em diferentes umidades. Conclusão condicionada a teste com a correia em <b>capacidade máxima</b> (material hoje abaixo do nominal).</p>
          </div>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">📈 Curvas solicitadas (P&D)</h3>
          <p className="text-slate-400 text-xs mb-3">Levantamentos de caracterização pedidos pelo P&D — dependem da fase com carga</p>
          <div className="space-y-2">
            {CURVAS.map((c,i)=>(
              <div key={i} className="flex items-start gap-3 rounded-xl border border-slate-200 p-3">
                <span className="text-[10px] font-bold text-white bg-slate-400 px-2 py-0.5 rounded-full mt-0.5 whitespace-nowrap">AGUARDANDO</span>
                <div><p className="text-sm text-slate-700">{c.titulo}</p><p className="text-[11px] text-slate-400">{c.sistema}</p></div>
              </div>
            ))}
          </div>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">📉 Burndown · pendências por relatório</h3>
          <p className="text-slate-400 text-xs mb-3">Histórico cumulativo desde 18/05 · {total} pontos. Nota: as colunas 28/05 e 29/05 contam tudo cumulativamente e podem diferir dos PDFs daqueles dias (que abreviavam itens já resolvidos).</p>
          <Burndown data={burndown}/>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">📍 Prontidão por transportador</h3>
          <p className="text-slate-400 text-xs mb-4">Pendências por área (punch list) — todas não impeditivas</p>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {tcData.map(t=>(
              <div key={t.tc} className={"rounded-xl p-3 border-2 " + (t.pronto ? 'border-emerald-300 bg-emerald-50' : 'border-amber-300 bg-amber-50')}>
                <div className="flex items-center justify-between">
                  <span className="font-bold text-slate-800 text-sm">{t.tc}</span>
                  <span className="text-lg">{t.pronto ? '✅' : '⚠️'}</span>
                </div>
                <div className="text-[11px] text-slate-500 mt-1">{t.resolvido}/{t.total} resolvidos</div>
                <div className={"text-xs font-semibold mt-0.5 " + (t.pronto?'text-emerald-600':'text-amber-600')}>{t.pronto ? 'sem pendências' : t.open + ' em aberto'}</div>
                {t.note && <div className="text-[10px] text-slate-400 mt-1">{t.note}</div>}
              </div>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className={card + " p-5"}>
            <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">📊 Pendências por Subsistema</h3>
            <p className="text-slate-400 text-xs mb-4">Distribuição dos {total} pontos do punch list</p>
            <Bars data={phaseData}/>
          </div>
          <div className={card + " p-5"}>
            <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">⚡ Status dos pontos</h3>
            <p className="text-slate-400 text-xs mb-4">Situação dos {total} pontos do punch list</p>
            <StatusPie data={statusPie}/>
          </div>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">⏱️ Idade das pendências em aberto</h3>
          <p className="text-slate-400 text-xs mb-4">Dias desde a 1ª aparição até 10/06 · ordenado do mais antigo</p>
          <div className="space-y-2">
            {aging.map(p=>{ const c=ageColor(p.idade,p.status); return (
              <div key={p.id} className={"flex items-center gap-3 rounded-xl p-2.5 " + c.bg}>
                <span className="text-xs font-mono text-slate-400 w-6 text-right">#{p.id}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm text-slate-700 truncate">{p.desc}{p.reincidente && <span className="text-[10px] text-red-500 font-bold ml-1">(reincidente)</span>}{p.est && <span className="text-[10px] text-slate-400 ml-1">(data est.)</span>}</p>
                  <div className="h-1.5 mt-1 rounded-full bg-slate-200 overflow-hidden"><div className={"h-full rounded-full " + c.bar} style={{width:((p.idade/maxAge)*100)+'%'}}></div></div>
                </div>
                <span className={"text-sm font-bold whitespace-nowrap " + c.txt}>{p.idade===0?'novo':p.idade+'d'}</span>
              </div>
            );})}
          </div>
        </div>

        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 text-lg flex items-center gap-2">🔍 Leitura do Comissionamento</h3>
          {!print && <p className="text-slate-400 text-xs mb-4">Toque em um item para expandir</p>}
          <div className="space-y-3 mt-3">
            {INSIGHTS.map((ins,i)=>(
              <div key={i} onClick={()=>!print && setActiveInsight(activeInsight===i?null:i)} className={"border-l-4 rounded-xl p-4 transition-all " + ins.color + (print?'':' cursor-pointer hover:shadow-md')}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">{ins.icon}</span>
                    <div><span className={"text-[10px] font-bold text-white px-2 py-0.5 rounded-full mr-2 " + ins.badgeColor}>{ins.badge}</span><span className="font-semibold text-slate-800 text-sm">{ins.title}</span></div>
                  </div>
                  {!print && <span className="text-slate-400 text-lg">{activeInsight===i?'▲':'▼'}</span>}
                </div>
                {(print || activeInsight===i) && <p className="mt-3 text-sm text-slate-700 leading-relaxed pl-11">{ins.text}</p>}
              </div>
            ))}
          </div>
        </div>

        <div className={print ? "rounded-2xl border-2 border-cyan-600 p-5" : "bg-gradient-to-r from-cyan-600 to-blue-700 rounded-2xl shadow p-5 text-white"}>
          <h3 className={"font-bold text-lg mb-3 flex items-center gap-2 " + (print?'text-slate-800':'')}>📦 Próximos 3 movimentos</h3>
          <div className="space-y-2">
            {MOVES.map((a,i)=>(
              <div key={i} className={"flex items-start gap-3 rounded-xl p-3 " + (print?'bg-slate-50 border border-slate-200':'bg-white/10')}>
                <span className={"text-xs font-bold px-2 py-1 rounded-lg whitespace-nowrap " + (print?'bg-cyan-600 text-white':'bg-white/20')}>{a.tag}</span>
                <span className={"text-sm " + (print?'text-slate-700':'opacity-90')}>{a.action}</span>
              </div>
            ))}
          </div>
        </div>

        <p className="text-center text-xs text-slate-400 pb-2">Comissionamento iniciado em 18/05/2026 · relatórios de 18, 21, 22, 25, 28, 29/05, 03, 08 e 10/06 · classificação de TC/subsistema sujeita a revisão</p>
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
} catch (err) {
  document.getElementById('root').innerHTML = '<div style="padding:16px;font-family:monospace;color:#b91c1c;white-space:pre-wrap;font-size:13px">Erro: ' + err.message + '</div>';
}
</script>
</body>
</html>
