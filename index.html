  {id:18, desc:"Ajustes na câmera termográfica", sub:"Instrumentação", tc:"Geral", status:"resolvido", aberto_em:"2026-06-03", fechado_em:"2026-06-03", est:true},

  {id:30, desc:"Alimentação do silo comissionada", sub:"Mecânica & Acionamentos", tc:"Geral", status:"resolvido", aberto_em:"2026-06-08", fechado_em:"2026-06-08"},
  {id:31, desc:"Válvula helicoidal testada", sub:"Mecânica & Acionamentos", tc:"Geral", status:"resolvido", aberto_em:"2026-06-08", fechado_em:"2026-06-08"},

const SUBS = ["Elétrica & Automação","Instrumentação","Proteções / NR-12","Mecânica & Acionamentos","Utilidades (Ar/Água/Skid)","Processo & Ambiente"];
const SUB_SHORT = { "Elétrica & Automação":"Elétrica/Autom.","Instrumentação":"Instrumentação","Proteções / NR-12":"Proteções NR-12","Mecânica & Acionamentos":"Mecânica","Utilidades (Ar/Água/Skid)":"Utilidades","Processo & Ambiente":"Processo/Amb." };
const STATUS_META = { resolvido:{name:'Resolvido', color:'#10b981'}, avaliacao:{name:'Em avaliação', color:'#f59e0b'}, material:{name:'Aguardando instalação', color:'#3b82f6'}, falha:{name:'Falha ativa', color:'#ef4444'} };
const TC_ORDER = ['TC-03','TC-07','TC-10','Skid','Geral'];
const TC_NOTE = { 'Skid':'bomba OK (teste 08/06)', 'TC-03':'inclui falha 80C8 (em tratamento)' };

const DAY = 86400000;
const parseDate = s => { const [y,m,d] = s.split('-').map(Number); return Date.UTC(y, m-1, d); };
const fmtShort = t => new Date(t).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', timeZone:'UTC' });
const daysBetween = (a, b) => Math.round((b - a) / DAY);
const refT = parseDate(REF);

const INSIGHTS = [
  { icon:'🚀', title:'Comissionamento com carga LIBERADO', badge:'MARCO', badgeColor:'bg-emerald-500', color:'border-emerald-400 bg-emerald-50',
    text:'Teste do skid aprovado em 08/06 — bomba (parte integrante do skid), bicos dispersores da TC-03 e TC-10, alimentação do silo e válvula helicoidal, todos comissionados com sucesso. O sistema está autorizado a subir para a operação com carga. Encerra a etapa a vazio.' },
  { icon:'📡', title:'Sensor de vazamento de micro-ondas — trava de segurança mitigada', badge:'MITIGADO', badgeColor:'bg-blue-500', color:'border-blue-400 bg-blue-50',
    text:'Único item com peso de segurança real. Enquanto o estudo não conclui, a operação se apoia em distância segura e medição com sensores portáteis. Concluir o estudo remove a dependência do controle interino.' },
  { icon:'⚡', title:'Falha 80C8 na F-037 (TC-03) — em tratamento, não impeditiva', badge:'EM TRATAMENTO', badgeColor:'bg-amber-500', color:'border-amber-400 bg-amber-50',
    text:'Pendência mais antiga (desde 28/05) e única falha eletroeletrônica ativa. Não impede operar com carga, mas convém fechar para não arrastar uma falha ativa em equipamento já em operação.' },
  { icon:'📈', title:'Da etapa a vazio à carga em 11 dias', badge:'TENDÊNCIA', badgeColor:'bg-cyan-600', color:'border-cyan-400 bg-cyan-50',
    text:'12 → 8 → 7 abertos nos três primeiros relatórios; em 08/06, 4 pontos de carga comissionados (skid) elevaram os resolvidos para 24. As 7 pendências antigas seguem abertas — todas não impeditivas.' },
  { icon:'📦', title:'Melhorias com material já em mãos', badge:'CAMINHO LIMPO', badgeColor:'bg-blue-500', color:'border-blue-400 bg-blue-50',
    text:'Borracha do limitador lateral (TC-03/TC-10) e cabo de aço anti-chicoteamento já recebidos — é só programar a instalação, agora em paralelo à operação com carga.' },
];

const MOVES = [
  { tag:'Operação', action:'Acompanhar a primeira campanha de comissionamento com carga — testar os periféricos sob fluxo de minério.' },
  { tag:'Segurança', action:'Concluir o estudo do sensor de vazamento de micro-ondas; manter distância segura + sensores portáteis até lá.' },
  { tag:'Em paralelo', action:'Tratar a falha 80C8 (F-037) e instalar borracha do limitador + cabo anti-chicoteamento (material em mãos).' },
];

function openAt(d){ return POINTS.filter(p => parseDate(p.aberto_em) <= d && (!p.fechado_em || parseDate(p.fechado_em) > d)).length; }
function resolvedAt(d){ return POINTS.filter(p => p.fechado_em && parseDate(p.fechado_em) <= d).length; }
function totalAt(d){ return POINTS.filter(p => parseDate(p.aberto_em) <= d).length; }
const buildBurndown = () => REPORTS.map(r => { const d = parseDate(r); return { label: fmtShort(d), abertos: openAt(d), resolvidos: resolvedAt(d), total: totalAt(d) }; });
const buildPhaseData = () => SUBS.map(sub => { const it = POINTS.filter(p => p.sub === sub); return { name: SUB_SHORT[sub], resolvido: it.filter(p=>p.status==='resolvido').length, pendente: it.filter(p=>p.status==='avaliacao'||p.status==='material').length, falha: it.filter(p=>p.status==='falha').length }; });
const buildStatusPie = () => Object.keys(STATUS_META).map(k => ({ name: STATUS_META[k].name, color: STATUS_META[k].color, value: POINTS.filter(p=>p.status===k).length })).filter(d=>d.value>0);
const buildAging = () => POINTS.filter(p=>!p.fechado_em).map(p => ({ ...p, idade: daysBetween(parseDate(p.aberto_em), refT) })).sort((a,b)=>b.idade-a.idade);
const buildTC = () => TC_ORDER.map(tc => { const it = POINTS.filter(p=>p.tc===tc); const open = it.filter(p=>!p.fechado_em); return { tc, total: it.length, resolvido: it.filter(p=>p.status==='resolvido').length, open: open.length, falha: it.filter(p=>p.status==='falha').length, pronto: open.length===0, note: TC_NOTE[tc] }; });

const ageColor = (idade, status) => status==='falha'||idade>=6 ? {bar:'bg-red-500',txt:'text-red-600',bg:'bg-red-50'} : idade>=3 ? {bar:'bg-amber-500',txt:'text-amber-600',bg:'bg-amber-50'} : {bar:'bg-slate-400',txt:'text-slate-600',bg:'bg-slate-50'};

function Dashboard() {
  const [activeInsight, setActiveInsight] = useState(0);
  const [print, setPrint] = useState(false);

  const total = POINTS.length;
  const done = POINTS.filter(p=>p.status==='resolvido').length;
  const open = total - done;
  const falhas = POINTS.filter(p=>p.status==='falha').length;
  const rate = ((done/total)*100).toFixed(0);
  const phaseData = buildPhaseData(), statusPie = buildStatusPie(), burndown = buildBurndown(), aging = buildAging(), tcData = buildTC();
  const maxAge = Math.max(...aging.map(a=>a.idade), 1);
  const openPts = POINTS.filter(p=>!p.fechado_em);
  const impeditivos = openPts.filter(p=>p.classe==='impeditivo');
  const mitigados = openPts.filter(p=>p.classe==='mitigado');
  const tratamento = openPts.filter(p=>p.classe==='tratamento');
  const melhorias = openPts.filter(p=>p.classe==='melhoria');
  const liberavel = impeditivos.length===0;

  const card = print ? "bg-white border border-slate-200 rounded-2xl" : "bg-white rounded-2xl shadow";

  const KPIS = [
    { label:'Pontos levantados', value:total, sub:'no comissionamento', grad:'from-cyan-500 to-blue-600', bord:'border-cyan-500', icon:'🎯' },
    { label:'Taxa de resolução', value:rate+'%', sub:done+' resolvidos', grad:'from-emerald-500 to-teal-600', bord:'border-emerald-500', icon:'✅' },
    { label:'Em aberto', value:open, sub:'não impeditivas', grad:'from-amber-500 to-orange-500', bord:'border-amber-500', icon:'📈' },
    { label:'Falhas ativas', value:falhas, sub:'⚠️ 80C8 · em tratamento', grad:'from-red-500 to-rose-600', bord:'border-red-500', icon:'⚠️' },
  ];

  return (
    <div className={print ? "min-h-screen bg-white p-4" : "min-h-screen bg-slate-50 p-4"}>
      <div className="max-w-5xl mx-auto space-y-4">

        {/* Header */}
        <div className={card + " p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3"}>
          <div>
            <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
              <svg viewBox="0 0 64 64" className="w-8 h-8 shrink-0" fill="none">
                <g stroke="#0891b2" strokeWidth={4.5} strokeLinecap="round">
                  <path d="M34.8 13.4 A11 11 0 0 1 42.6 21.2"/>
                  <path d="M36.4 7.6 A17 17 0 0 1 48.4 19.6"/>
                  <path d="M38 1.8 A23 23 0 0 1 54.2 18"/>
                  <path d="M29.2 13.4 A11 11 0 0 0 21.4 21.2"/>
                  <path d="M27.6 7.6 A17 17 0 0 0 15.6 19.6"/>
                  <path d="M26 1.8 A23 23 0 0 0 9.8 18"/>
                </g>
                <circle cx="32" cy="24" r="3.2" fill="#1e293b"/>
                <polygon points="32,27 24,56 40,56" fill="#1e293b"/>
                <rect x="21" y="55" width="22" height="4" rx="1.5" fill="#1e293b"/>
              </svg>
              Comissionamento TCMW
            </h1>
            <p className="text-slate-500 text-sm mt-1">Secagem de minério por micro-ondas · Resp.: Everton da Silva Campos · {total} pontos</p>
            <p className="text-xs text-slate-400 mt-1">Último marco: 08/06/2026 · histórico desde 28/05</p>
          </div>
          <button onClick={()=>setPrint(!print)}
            className={"flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm border transition-all " + (print ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50')}>
            🖨️ {print ? 'Tela' : 'Impressão'}
          </button>
        </div>

        {/* FASE */}
        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2">🚀 Fase do comissionamento</h3>
          <div className="flex items-center gap-2">
            <div className="flex-1 rounded-xl border-2 border-emerald-300 bg-emerald-50 p-3 text-center">
              <div className="text-xs font-bold text-emerald-700 uppercase tracking-wide">A vazio</div>
              <div className="text-2xl my-0.5">✅</div>
              <div className="text-[11px] text-slate-500">concluído</div>
            </div>
            <div className="text-2xl text-slate-300 font-bold">▶</div>
            <div className="flex-1 rounded-xl border-2 border-cyan-400 bg-cyan-50 p-3 text-center">
              <div className="text-xs font-bold text-cyan-700 uppercase tracking-wide">Com carga</div>
              <div className="text-2xl my-0.5">🚀</div>
              <div className="text-[11px] text-slate-500">liberado · 08/06</div>
            </div>
          </div>
          <div className="mt-3 flex items-start gap-2 bg-emerald-50 border border-emerald-200 rounded-xl p-3">
            <span className="mt-0.5">✅</span>
            <p className="text-xs text-slate-600">Gate <b>APROVADO (08/06)</b>: teste do skid — bomba, bicos dispersores TC-03/TC-10, alimentação do silo e válvula helicoidal. Sistema liberado para comissionamento com carga; melhorias seguem em paralelo.</p>
          </div>
        </div>

        {/* SELO */}
        <div className={"rounded-2xl p-5 border-2 " + (liberavel ? 'border-emerald-400 bg-emerald-50' : 'border-amber-400 bg-amber-50')}>
          <div className="flex items-start gap-3">
            <span className="text-2xl mt-0.5">🛡️</span>
            <div className="flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-bold text-slate-800 text-lg">{liberavel ? 'Operação liberável' : 'Liberação CONDICIONADA'}</span>
                <span className={"text-xs font-bold text-white px-2 py-0.5 rounded-full " + (liberavel?'bg-emerald-500':'bg-amber-500')}>{impeditivos.length} impeditivo{impeditivos.length!==1?'s':''}</span>
              </div>
              <p className="text-sm text-slate-700 mt-1">Nenhuma pendência impede a operação. As {openPts.length} em aberto são: 1 item de segurança mitigado, 1 falha em tratamento e {melhorias.length} melhorias.</p>
              <div className="mt-3 space-y-1.5">
                {mitigados.map(m=>(
                  <div key={m.id} className="flex items-start gap-2 bg-white border border-blue-200 rounded-lg p-2">
                    <span className="text-[10px] font-bold text-white bg-blue-500 px-2 py-0.5 rounded-full mt-0.5 whitespace-nowrap">MITIGADO</span>
                    <span className="text-xs text-slate-700">#{m.id} {m.desc.split('—')[0].trim()} — {m.nota}</span>
                  </div>
                ))}
                {tratamento.map(t=>(
                  <div key={t.id} className="flex items-start gap-2 bg-white border border-amber-200 rounded-lg p-2">
                    <span className="text-[10px] font-bold text-white bg-amber-500 px-2 py-0.5 rounded-full mt-0.5 whitespace-nowrap">EM TRATAMENTO</span>
                    <span className="text-xs text-slate-700">#{t.id} {t.desc} — falha ativa, não impeditiva</span>
                  </div>
                ))}
                <div className="text-xs text-slate-500 pl-1">+ {melhorias.length} melhorias (não impeditivas)</div>
              </div>
            </div>
          </div>
        </div>

        {/* KPIs */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {KPIS.map((k,i)=> print ? (
            <div key={i} className={"bg-white border-l-4 " + k.bord + " border border-slate-200 rounded-2xl p-4"}>
              <div className="text-3xl font-bold text-slate-800">{k.value}</div>
              <div className="text-xs text-slate-500 mt-1">{k.label}</div>
              <div className="text-xs text-slate-400">{k.sub}</div>
            </div>
          ) : (
            <div key={i} className={"bg-gradient-to-br " + k.grad + " text-white rounded-2xl p-4 shadow"}>
              <div className="flex justify-between items-start mb-2"><span className="text-2xl">{k.icon}</span><span className="text-[10px] font-medium bg-white/20 px-2 py-0.5 rounded-full uppercase tracking-wide">{k.label.split(' ')[0]}</span></div>
              <div className="text-3xl font-bold">{k.value}</div>
              <div className="text-xs opacity-80 mt-1">{k.label}</div>
              <div className="text-xs opacity-60">{k.sub}</div>
            </div>
          ))}
        </div>

        {/* TESTES COM CARGA */}
        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">🚀 Testes com carga (periféricos)</h3>
          <p className="text-slate-400 text-xs mb-3">Fase iniciada em 08/06 · teste dos periféricos sob fluxo de minério</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              {label:'Periféricos testados', value:'—', sub:'sob carga'},
              {label:'Válvulas de amostragem', value:'—', sub:'previsto 09/06'},
              {label:'Chutes / calhas', value:'—', sub:'a programar'},
              {label:'Válvulas rotativas', value:'—', sub:'a programar'},
            ].map((m,i)=>(
              <div key={i} className="rounded-xl border border-slate-200 p-3">
                <div className="text-2xl font-bold text-slate-800">{m.value}</div>
                <div className="text-xs text-slate-500 mt-1">{m.label}</div>
                <div className="text-[11px] text-slate-400">{m.sub}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 flex items-start gap-2 bg-cyan-50 border border-cyan-200 rounded-xl p-3">
            <span className="mt-0.5">📊</span>
            <p className="text-xs text-slate-600">Painel a preencher conforme os periféricos forem testados com carga. Performance de secagem (umidade, tonelagem) é métrica de <b>operação</b>, após a entrega — fora do escopo do comissionamento.</p>
          </div>
        </div>

        {/* Burndown */}
        <div className={card + " p-5"}>
          <div className="flex items-center justify-between mb-1">
            <h3 className="font-bold text-slate-700 flex items-center gap-2">📉 Burndown · evolução por relatório</h3>
            <span className="text-xs text-slate-400">meta: abertos → 0</span>
          </div>
          <p className="text-slate-400 text-xs mb-3">28/05 · 29/05 · 03/06 · 08/06 (teste do skid)</p>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={burndown} margin={{left:-12, right:12, top:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="label" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}} allowDecimals={false}/>
              <Tooltip/><Legend iconSize={10} wrapperStyle={{fontSize:11}}/>
              <ReferenceLine y={0} stroke="#10b981" strokeDasharray="4 4"/>
              <Line type="monotone" dataKey="total" stroke="#cbd5e1" strokeWidth={2} strokeDasharray="5 5" dot={{r:3}} name="Levantados"/>
              <Line type="monotone" dataKey="resolvidos" stroke="#10b981" strokeWidth={2.5} dot={{r:3}} name="Resolvidos"/>
              <Line type="monotone" dataKey="abertos" stroke="#0891b2" strokeWidth={3} dot={{r:4}} activeDot={{r:6}} name="Em aberto"/>
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* TC */}
        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">📍 Prontidão por transportador</h3>
          <p className="text-slate-400 text-xs mb-4">Pendências por área — todas não impeditivas</p>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {tcData.map(t=>(
              <div key={t.tc} className={"rounded-xl p-3 border-2 " + (t.pronto ? 'border-emerald-300 bg-emerald-50' : 'border-amber-300 bg-amber-50')}>
                <div className="flex items-center justify-between">
                  <span className="font-bold text-slate-800 text-sm">{t.tc}</span>
                  <span className="text-lg">{t.pronto ? '✅' : '⚠️'}</span>
                </div>
                <div className="text-[11px] text-slate-500 mt-1">{t.resolvido}/{t.total} resolvidos</div>
                <div className={"text-xs font-semibold mt-0.5 " + (t.pronto?'text-emerald-600':'text-amber-600')}>{t.pronto ? 'sem pendências' : t.open + ' em aberto'}</div>
                {t.note && <div className="text-[10px] text-slate-400 mt-1">{t.note}</div>}
              </div>
            ))}
          </div>
        </div>

        {/* Charts */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className={card + " p-5"}>
            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">📊 Pontos por Subsistema</h3>
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={phaseData} layout="vertical" margin={{left:8, right:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis type="number" tick={{fontSize:11}} allowDecimals={false}/><YAxis dataKey="name" type="category" tick={{fontSize:10}} width={92}/>
                <Tooltip/><Legend iconSize={10} wrapperStyle={{fontSize:11}}/>
                <Bar dataKey="resolvido" stackId="a" fill="#10b981" name="Resolvido"/>
                <Bar dataKey="pendente" stackId="a" fill="#f59e0b" name="Pendente"/>
                <Bar dataKey="falha" stackId="a" fill="#ef4444" name="Falha"/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className={card + " p-5"}>
            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">⚡ Status dos Pontos</h3>
            <ResponsiveContainer width="100%" height={240}>
              <PieChart>
                <Pie data={statusPie} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({value})=>value} labelLine={false}>
                  {statusPie.map((e,i)=><Cell key={i} fill={e.color}/>)}
                </Pie>
                <Tooltip/><Legend iconSize={10} wrapperStyle={{fontSize:11}}/>
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Aging */}
        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 flex items-center gap-2">⏱️ Idade das pendências em aberto</h3>
          <p className="text-slate-400 text-xs mb-4">Dias desde a 1ª aparição (28/05) até 08/06 · ordenado do mais antigo</p>
          <div className="space-y-2">
            {aging.map(p=>{ const c=ageColor(p.idade,p.status); return (
              <div key={p.id} className={"flex items-center gap-3 rounded-xl p-2.5 " + c.bg}>
                <span className="text-xs font-mono text-slate-400 w-6 text-right">#{p.id}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm text-slate-700 truncate">{p.desc}{p.est && <span className="text-[10px] text-slate-400 ml-1">(data est.)</span>}</p>
                  <div className="h-1.5 mt-1 rounded-full bg-slate-200 overflow-hidden"><div className={"h-full rounded-full " + c.bar} style={{width:((p.idade/maxAge)*100)+'%'}}/></div>
                </div>
                <span className={"text-sm font-bold whitespace-nowrap " + c.txt}>{p.idade===0?'novo':'≥'+p.idade+'d'}</span>
              </div>
            );})}
          </div>
        </div>

        {/* Insights */}
        <div className={card + " p-5"}>
          <h3 className="font-bold text-slate-700 mb-1 text-lg flex items-center gap-2">🔍 Leitura do Comissionamento</h3>
          {!print && <p className="text-slate-400 text-xs mb-4">Clique em um item para expandir</p>}
          <div className="space-y-3 mt-3">
            {INSIGHTS.map((ins,i)=>(
              <div key={i} onClick={()=>!print && setActiveInsight(activeInsight===i?null:i)}
                className={"border-l-4 rounded-xl p-4 transition-all " + ins.color + (print?'':' cursor-pointer hover:shadow-md')}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">{ins.icon}</span>
                    <div><span className={"text-[10px] font-bold text-white px-2 py-0.5 rounded-full mr-2 " + ins.badgeColor}>{ins.badge}</span><span className="font-semibold text-slate-800 text-sm">{ins.title}</span></div>
                  </div>
                  {!print && <span className="text-slate-400 text-lg">{activeInsight===i?'▲':'▼'}</span>}
                </div>
                {(print || activeInsight===i) && <p className="mt-3 text-sm text-slate-700 leading-relaxed pl-11">{ins.text}</p>}
              </div>
            ))}
          </div>
        </div>

        {/* Movimentos */}
        <div className={print ? "rounded-2xl border-2 border-cyan-600 p-5" : "bg-gradient-to-r from-cyan-600 to-blue-700 rounded-2xl shadow p-5 text-white"}>
          <h3 className={"font-bold text-lg mb-3 flex items-center gap-2 " + (print?'text-slate-800':'')}>📦 Próximos 3 movimentos</h3>
          <div className="space-y-2">
            {MOVES.map((a,i)=>(
              <div key={i} className={"flex items-start gap-3 rounded-xl p-3 " + (print?'bg-slate-50 border border-slate-200':'bg-white/10')}>
                <span className={"text-xs font-bold px-2 py-1 rounded-lg whitespace-nowrap " + (print?'bg-cyan-600 text-white':'bg-white/20')}>{a.tag}</span>
                <span className={"text-sm " + (print?'text-slate-700':'opacity-90')}>{a.action}</span>
              </div>
            ))}
          </div>
        </div>

        <p className="text-center text-xs text-slate-400 pb-2">Relatórios de 28/05, 29/05, 03/06 e teste do skid em 08/06/2026 · classificação de TC/subsistema sujeita a revisão</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
